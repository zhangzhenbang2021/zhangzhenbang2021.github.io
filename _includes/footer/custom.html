<!-- Connectomics section interactions -->
<script>
  (function () {
    function setupFootnotePreviews() {
      var footnotes = document.querySelectorAll('.footnotes li[id^="fn:"]');
      if (!footnotes.length) return;

      footnotes.forEach(function (note) {
        var id = note.id.replace('fn:', '');
        var clone = note.cloneNode(true);
        var backref = clone.querySelector('.reversefootnote');
        if (backref) backref.remove();

        var preview = clone.textContent.replace(/\s+/g, ' ').trim();
        document.querySelectorAll('a.footnote[href="#fn:' + id + '"]').forEach(function (ref) {
          ref.setAttribute('data-cite-preview', preview);
        });
      });
    }

    function setupConnectomicsReveal() {
      var targets = Array.prototype.slice.call(document.querySelectorAll('.connectomics-essay'));
      var footnotes = document.querySelector('.footnotes');
      if (footnotes) {
        footnotes.classList.add('connectomics-reveal-footnotes');
        targets.push(footnotes);
      }

      if (!targets.length) return;

      targets.forEach(function (target) {
        if (target.classList.contains('connectomics-essay')) {
          target.classList.add('connectomics-reveal');
        }
      });

      if (!('IntersectionObserver' in window)) {
        targets.forEach(function (target) { target.classList.add('is-visible'); });
        return;
      }

      var observer = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.16 });

      targets.forEach(function (target) { observer.observe(target); });
    }

    document.addEventListener('DOMContentLoaded', function () {
      setupFootnotePreviews();
      setupConnectomicsReveal();
    });
  }());
</script>
