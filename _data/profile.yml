short_bio: >-
  <p>
    I am a first-year M.Sc. student in Machine Learning at
    <a href="https://www.mbzuai.ac.ae/" target="_blank">Mohamed bin Zayed University of Artificial Intelligence (MBZUAI)</a>,
    advised by Prof. <a href="https://scholar.google.com/citations?user=0R20iBMAAAAJ&hl=en" target="_blank">Zhiqiang Xu</a>.
    My research interests broadly lie in computer vision, 3D/4D AI, and AI for biomedical imaging and connectomics.
  </p>
  <p>
    I am especially interested in building learning-based methods for spatial understanding,
    3D/4D reconstruction and generation, temporally consistent visual modeling,
    and large-scale biomedical image analysis.
  </p>
  <p>
    Research interests: computer vision, 3D/4D AI, spatial intelligence, 3D/4D reconstruction and generation,
    temporally consistent visual modeling, AI for biomedical imaging, and computational connectomics.
  </p>

