short_bio: >-
  <p>
    I am a first-year M.Sc. student in Machine Learning at
    <a href="https://www.mbzuai.ac.ae/" target="_blank">Mohamed bin Zayed University of Artificial Intelligence (MBZUAI)</a>,
    advised by Prof. <a href="https://scholar.google.com/citations?user=0R20iBMAAAAJ&hl=en" target="_blank">Zhiqiang Xu</a>.
    My research interests broadly lie in computer vision and AI for biomedical imaging and connectomics.
  </p>
  <p>
    My work focuses on developing AI methods for recovering reliable spatial-temporal structure from noisy, distorted,
    incomplete, and inconsistent visual observations. I am particularly interested in modeling visual degradations such as
    noise, distortion, missing data, and motion conflicts, and in designing structure-preserving reconstruction methods
    for 3D alignment, inpainting, and volumetric consistency. My research spans both general visual data, such as video
    generation, and scientific imaging data, such as connectomics microscopy.
  </p>

